<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xenia</title>
  <style>
    /* ── Xenia · warm terminal palette ───────────────────────────────────────── */
    :root {
      --bg:#FCF8F8; --fg:#2D2D2D; --accent:#F5AFAF; --muted:#8E8383;
      --border:#F9DFDF; --surface:#FBEFEF; --err:#B4302F;
      --mono:"Maple Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#0F0D0D; --fg:#ECE6E6; --accent:#F5AFAF; --muted:#8E8383;
        --border:#2A2222; --surface:#181414; --err:#F0A0A0;
      }
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      width:340px; min-height:420px;
      display:flex; flex-direction:column;
      font-family:var(--mono); font-size:13px;
      background:var(--bg); color:var(--fg);
      -webkit-font-smoothing:antialiased;
    }
    ::selection { background:rgba(245,175,175,0.30); }

    .header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:14px 16px; display:flex; align-items:center; gap:10px;
    }
    .logo {
      width:30px; height:30px; background:var(--accent); color:#2D2D2D;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:15px; border:1px solid var(--border);
    }
    .header-text h1 { font-size:16px; font-weight:700; letter-spacing:0.04em; }
    .header-text p { font-size:10px; color:var(--muted); margin-top:2px; letter-spacing:0.02em; }

    .content { padding:16px; flex:1; }

    .net-badge {
      display:inline-flex; align-items:center; gap:7px;
      border:1px solid var(--border); background:var(--surface);
      padding:5px 10px; font-size:10px; color:var(--muted);
      letter-spacing:0.04em; margin-bottom:16px;
    }
    .net-badge .dot { width:6px; height:6px; background:var(--accent); }

    .card {
      background:var(--surface); border:1px solid var(--border);
      padding:14px; margin-bottom:12px;
    }
    .steps h3 {
      font-size:10px; font-weight:700; color:var(--muted);
      letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px;
    }
    .steps ol { list-style:none; counter-reset:st; }
    .steps li {
      counter-increment:st; position:relative; padding-left:26px;
      margin-bottom:10px; font-size:12px; line-height:1.45; color:var(--muted);
    }
    .steps li:last-child { margin-bottom:0; }
    .steps li::before {
      content:counter(st); position:absolute; left:0; top:0;
      width:17px; height:17px; background:var(--accent); color:#2D2D2D;
      font-size:10px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
    }
    .steps li b { color:var(--fg); }

    .btn-primary {
      display:block; width:100%; padding:11px;
      background:var(--accent); color:#2D2D2D;
      border:1px solid var(--border); border-radius:0;
      font-family:var(--mono); font-size:13px; font-weight:700;
      letter-spacing:0.02em; cursor:pointer; text-align:center; text-decoration:none;
      transition:filter 0.12s;
    }
    .btn-primary:hover { filter:brightness(0.96); }

    .actions { display:flex; gap:8px; margin-top:10px; }
    .btn-sm {
      flex:1; padding:9px 4px; border:1px solid var(--border);
      background:var(--bg); color:var(--fg); border-radius:0;
      font-family:var(--mono); font-size:11px; cursor:pointer;
      transition:background 0.12s, border-color 0.12s;
    }
    .btn-sm:hover { border-color:var(--accent); background:var(--surface); }

    .acc-label {
      font-size:10px; color:var(--muted); letter-spacing:0.08em;
      text-transform:uppercase; margin-bottom:8px;
    }
    .handle { font-weight:700; font-size:14px; }
    .address { font-size:11px; color:var(--muted); margin-top:3px; word-break:break-all; }
    .link-btn {
      background:none; border:none; color:var(--muted);
      font-family:var(--mono); font-size:11px; cursor:pointer; padding:0; margin-top:10px;
    }
    .link-btn:hover { color:var(--err); }

    .footer {
      margin-top:auto; padding:11px 16px; border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      font-size:10px; color:var(--muted); letter-spacing:0.02em;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">X</div>
    <div class="header-text">
      <h1>Xenia</h1>
      <p>tip on somnia network</p>
    </div>
  </div>

  <div class="content">
    <div class="net-badge"><span class="dot"></span> Somnia Testnet · chainId 50312</div>

    <div class="card steps">
      <h3>How to tip</h3>
      <ol>
        <li>Open any tweet or profile on <b>X</b></li>
        <li>Click the pink <b>Tip</b> button</li>
        <li>Enter an amount, confirm in your wallet</li>
      </ol>
    </div>

    <a href="https://x.com" target="_blank" rel="noopener" class="btn-primary">Open X &rarr;</a>

    <div class="actions">
      <button class="btn-sm" data-url="https://xenia-production.up.railway.app/dashboard">Dashboard</button>
      <button class="btn-sm" data-url="https://xenia-production.up.railway.app/docs">Docs</button>
    </div>

    <div class="card" id="account" style="display:none;">
      <div class="acc-label">Paired account</div>
      <div class="handle" id="acc-handle">@&mdash;</div>
      <div class="address" id="acc-address">&mdash;</div>
      <button class="link-btn" id="logout-btn">disconnect account</button>
    </div>
  </div>

  <div class="footer">
    <span>powered by somnia</span>
    <span>testnet</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
