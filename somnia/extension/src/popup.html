<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xenia</title>
  <style>
    /* ── Xenia · taalos warm terminal palette ───────────────────────────────── */
    :root {
      --bg:        #FCF8F8;
      --fg:        #2D2D2D;
      --accent:    #F5AFAF;
      --muted:     #8E8383;
      --border:    #F9DFDF;
      --surface:   #FBEFEF;
      --surface-h: #F9DFDF;
      --ok:        #2D2D2D;
      --err:       #B4302F;
      --mono: "Maple Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #0F0D0D;
        --fg:        #ECE6E6;
        --accent:    #F5AFAF;
        --muted:     #8E8383;
        --border:    #2A2222;
        --surface:   #181414;
        --surface-h: #221A1A;
        --ok:        #ECE6E6;
        --err:       #F0A0A0;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 400px;
      font-family: var(--mono);
      font-size: 13px;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(245,175,175,0.30); }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 30px; height: 30px;
      background: var(--accent);
      color: #2D2D2D;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      border: 1px solid var(--border);
    }
    .header-text h1 {
      font-size: 16px; font-weight: 700; letter-spacing: 0.04em; color: var(--fg);
    }
    .header-text p {
      font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.02em;
    }

    .content { padding: 16px; }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */
    .btn-primary {
      display: block; width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #2D2D2D;
      border: 1px solid var(--border);
      border-radius: 0;
      font-family: var(--mono);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      text-align: center; text-decoration: none;
      transition: filter 0.12s;
    }
    .btn-primary:hover { filter: brightness(0.95); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Login view ──────────────────────────────────────────────────────────── */
    #view-login { display: none; }
    #view-login .hero { text-align: center; padding: 18px 0 4px; }
    #view-login .hero h2 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    #view-login .hero p { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }

    .key-block { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
    .key-block p { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

    .field {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--surface);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    .field::placeholder { color: var(--muted); }
    .field:focus { border-color: var(--accent); }

    .status { font-size: 11px; margin-top: 6px; text-align: center; min-height: 16px; }

    /* ── User view ───────────────────────────────────────────────────────────── */
    #view-user { display: none; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .user-card .handle { font-weight: 700; font-size: 14px; }
    .user-card .address {
      font-size: 11px; color: var(--muted); margin-top: 3px; word-break: break-all;
    }

    .balance-card { text-align: center; }
    .balance-card .amount { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
    .balance-card .label { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

    .actions { display: flex; gap: 6px; margin-bottom: 10px; }
    .btn-sm {
      flex: 1; padding: 8px 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      border-radius: 0;
      font-family: var(--mono);
      font-size: 11px; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn-sm:hover { border-color: var(--accent); background: var(--surface); }

    .tip-form h3 {
      font-size: 11px; font-weight: 700; margin-bottom: 10px;
      color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ── Footer ──────────────────────────────────────────────────────────────── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-left { font-size: 10px; color: var(--muted); letter-spacing: 0.02em; }
    .logout-btn {
      font-size: 11px; color: var(--muted);
      background: none; border: none; cursor: pointer;
      font-family: var(--mono);
    }
    .logout-btn:hover { color: var(--err); }

    #loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">X</div>
    <div class="header-text">
      <h1>Xenia</h1>
      <p>tip on somnia network</p>
    </div>
  </div>

  <div id="loading" class="content">Loading…</div>

  <!-- Not logged in -->
  <div id="view-login" class="content">
    <div class="hero">
      <h2>Connect your Xenia account</h2>
      <p>Login to Xenia to start sending tips on X.</p>
      <a href="https://xenia.app" target="_blank" class="btn-primary">Open Xenia →</a>
    </div>
    <div class="key-block">
      <p>Already have an API key?</p>
      <input id="api-key-input" type="text" placeholder="xen_…" class="field" autocomplete="off" spellcheck="false" />
      <button id="save-key-btn" class="btn-primary">Save Key</button>
      <div id="key-status" class="status"></div>
    </div>
  </div>

  <!-- Logged in -->
  <div id="view-user" class="content">
    <div class="card user-card">
      <div class="handle" id="user-handle">@—</div>
      <div class="address" id="user-address">—</div>
    </div>
    <div class="card balance-card">
      <div class="amount" id="user-balance">—</div>
      <div class="label">STT Balance</div>
    </div>
    <div class="actions">
      <button class="btn-sm" onclick="window.open('https://xenia.app/send-tips')">Send Tip</button>
      <button class="btn-sm" onclick="window.open('https://xenia.app/deposit')">Deposit</button>
      <button class="btn-sm" onclick="window.open('https://xenia.app/claims')">Claims</button>
    </div>

    <div class="card tip-form">
      <h3>Quick Tip</h3>
      <input id="tip-handle" type="text" placeholder="@twitterhandle" class="field" autocomplete="off" spellcheck="false" />
      <input id="tip-amount" type="number" placeholder="Amount (STT)" min="0.001" step="0.001" class="field" />
      <button id="tip-send-btn" class="btn-primary">Send</button>
      <div id="tip-status" class="status"></div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-left">powered by somnia</span>
    <button class="logout-btn" id="logout-btn">disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
